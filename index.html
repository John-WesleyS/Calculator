<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Clone</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body style="background-color: rgb(33, 26, 26);">
    <div class="cal" >
        <input type="text" class="input" >
        <div class="buttons">
            <button class="btn" onclick="append('/')" >/</button>
            <button class="btn" onclick="append('1')">1</button>
            <button class="btn" onclick="append('2')">2</button>
            <button class="btn" onclick="append('3')">3</button>
            <button class="btn" onclick="append('*')">*</button>
            <button class="btn" onclick="append('4')">4</button>
            <button class="btn" onclick="append('5')">5</button>
            <button class="btn" onclick="append('6')">6</button>
            <button class="btn" onclick="append('-')">-</button>
            <button class="btn" onclick="append('7')">7</button>
            <button class="btn" onclick="append('8')">8</button>
            <button class="btn" onclick="append('9')">9</button>
            <button class="btn" onclick="append('+')">+</button>
            <button class="btn" onclick="append('0')">0</button>
            <button class="btn" onclick="append('.')">.</button>
            <button class="btn" onclick="clearInput()" style="background-color: red;">C</button>
            <button class="btn" onclick="append('%')">%</button>
            <button class="btn" onclick="calculate()" style="background-color: rgb(12, 194, 255);">=</button>
        </div>
    </div>
</body>
<script defer src="script.js"></script>
</html>
